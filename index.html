<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HistoryLens — Interactive Local History Research</title>
  <meta name="description"
    content="Explore and contribute to the history of your local area through an interactive map. Browse places, time-travel through eras, and build a community archive." />
  <meta property="og:title" content="HistoryLens — Interactive Local History" />
  <meta property="og:description" content="Collaboratively research and present local history on an interactive map." />
  <meta name="theme-color" content="#e6a04e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
</head>

<body>
  <div id="app">
    <!-- Map fills entire viewport -->
    <div id="map-container"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="glass-panel">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
            <path d="M2 12h20" />
          </svg>
          <h1>History<span class="accent">Lens</span></h1>
        </div>
        <div style="display: flex; gap: var(--space-sm); align-items: center;">
          <button id="btn-profile" class="btn btn-ghost"
            style="display:none; font-size: var(--text-xs); padding: 4px 8px;">My Profile</button>
          <button id="btn-auth" class="btn btn-ghost" style="font-size: var(--text-xs); padding: 4px 8px;">Sign
            In</button>
          <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
        </div>
      </div>

      <div class="sidebar-body">
        <!-- Project header -->
        <div id="project-header">
          <h2 id="project-name" class="editable-title">New Project</h2>
          <p id="project-desc" class="editable-desc">Click to add a description…</p>
          <div id="collab-actions" style="margin-top: var(--space-md); display: flex; gap: var(--space-sm);">
            <button id="btn-project-settings" class="btn btn-ghost"
              style="display:none; width: 100%; font-size: var(--text-xs); justify-content: center;">
              ⚙️ Project Settings
            </button>
            <button id="btn-collab-request" class="btn btn-ghost"
              style="display:none; width: 100%; font-size: var(--text-xs); justify-content: center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="8.5" cy="7" r="4" />
                <line x1="20" y1="8" x2="20" y2="14" />
                <line x1="23" y1="11" x2="17" y2="11" />
              </svg>
              Request Access
            </button>
          </div>
          <div id="collab-status" style="display:none; margin-top: var(--space-sm);"></div>
        </div>

        <!-- Search -->
        <div class="search-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input type="search" id="place-search" name="sidebar-search" placeholder="Search places, dates, events…"
            autocomplete="off" readonly onfocus="this.removeAttribute('readonly');" spellcheck="false" />
        </div>

        <div class="filter-row" style="margin-top: var(--space-sm); width: 100%;">
          <select id="category-filter" class="form-select"
            style="width: 100%; padding: var(--space-sm) var(--space-md);">
            <option value="">All Categories</option>
            <option value="residential">🏠 Residential</option>
            <option value="commercial">🏪 Commercial</option>
            <option value="landmark">⭐ Landmark</option>
            <option value="natural">🌳 Natural</option>
            <option value="infrastructure">🏗️ Infrastructure</option>
            <option value="other">Other...</option>
          </select>
        </div>

        <!-- Place list -->
        <div class="section-header">
          <h3>Explore Places</h3>
          <span id="place-count" class="badge">0</span>
        </div>
        <div id="place-list" class="place-list"></div>

        <!-- Action buttons -->
        <div class="sidebar-actions">
          <button id="btn-add-place" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Add Place
          </button>
          <div class="btn-group">
            <button id="btn-import" class="btn btn-ghost" title="Import data">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Import
            </button>
            <button id="btn-export" class="btn btn-ghost" title="Export data">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
              Export
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Hover Card (positioned dynamically) -->
    <div id="hover-card" class="hover-card glass-panel" style="display:none;">
      <div class="hover-card-image" id="hover-card-image"></div>
      <div class="hover-card-body">
        <h4 id="hover-card-title"></h4>
        <span class="hover-card-period" id="hover-card-period"></span>
        <p id="hover-card-summary"></p>
        <span class="hover-card-hint">Click for details →</span>
      </div>
    </div>

    <!-- Time Slider (Hidden for now) -->
    <div id="time-slider-container" class="glass-panel" style="display: none;">
      <button id="time-play" class="icon-btn" aria-label="Play timeline">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3" />
        </svg>
      </button>
      <div class="time-slider-track">
        <div class="time-labels" id="time-labels"></div>
        <input type="range" id="time-slider" min="1800" max="2025" value="2025" step="1" />
        <div class="time-ticks" id="time-ticks"></div>
      </div>
      <div class="time-current">
        <span id="time-current-year" class="year-display">2025</span>
        <span id="time-current-label" class="year-label">Present Day</span>
      </div>
    </div>

    <!-- Place Detail Modal -->
    <div id="place-detail-modal" class="modal-overlay" style="display:none;">
      <div class="modal glass-panel modal-large">
        <button class="modal-close icon-btn" data-close="place-detail-modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
        <div id="place-detail-content"></div>
      </div>
    </div>

    <!-- Place Form Modal -->
    <div id="place-form-modal" class="modal-overlay" style="display:none;">
      <div class="modal glass-panel">
        <button class="modal-close icon-btn" data-close="place-form-modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
        <div id="place-form-content"></div>
      </div>
    </div>

    <!-- Entry Form Modal -->
    <div id="entry-form-modal" class="modal-overlay" style="display:none;">
      <div class="modal glass-panel modal-large">
        <button class="modal-close icon-btn" data-close="entry-form-modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
        <div id="entry-form-content"></div>
      </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container"></div>
  </div>

  <!-- Profile Settings Modal -->
  <div id="profile-modal" class="modal-overlay" style="display:none; z-index: 3000;">
    <div class="modal glass-panel">
      <button class="modal-close icon-btn" data-close="profile-modal">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
      <div id="profile-modal-content"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
